services:
  postgres:
    image: postgres:17
    container_name: singbox-manager-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: singbox_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d singbox_manager"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
